# .goreleaser.yaml
# Documentation at https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/maknoon/main.go
    binary: maknoon

archives:
  - formats: [tar.gz]
    # this name template makes the result look like maknoon_1.0.0_darwin_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - maknoon.1
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew Tap configuration (Standard Formula for CLI tools)
brews:
  - name: maknoon
    repository:
      owner: al-Zamakhshari
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/al-Zamakhshari/maknoon"
    description: "Premier Post-Quantum Security Suite: Hybrid HPKE (ML-KEM + X25519) encryption."
    license: "MIT"
    test: |
      system "#{bin}/maknoon --version"
    install: |
      bin.install "maknoon"
      man1.install "maknoon.1"
