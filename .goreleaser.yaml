# .goreleaser.yaml
# Documentation at https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/maknoon/main.go
    binary: maknoon

archives:
  - format: tar.gz
    # this name template makes the result look like maknoon_1.0.0_darwin_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - maknoon.1
    format_overrides:
...
    install: |
      bin.install "maknoon"
      man1.install "maknoon.1"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew Tap configuration
brews:
  - name: maknoon
    repository:
      owner: a-khallaf
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/a-khallaf/maknoon"
    description: "Versatile, ultra-efficient Post-Quantum CLI encryption tool with streaming directory support and memory hygiene."
    license: "MIT"
    test: |
      system "#{bin}/maknoon --version"
    install: |
      bin.install "maknoon"
