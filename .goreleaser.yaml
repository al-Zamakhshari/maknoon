# .goreleaser.yaml
# Documentation at https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/maknoon/main.go
    binary: maknoon

archives:
  - formats: [tar.gz]
    # this name template makes the result look like maknoon_1.0.0_darwin_arm64.tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - maknoon.1
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew Cask configuration (modern distribution for pre-built binaries)
homebrew_casks:
  - name: maknoon
    repository:
      owner: al-Zamakhshari
      name: homebrew-tap
    homepage: "https://github.com/al-Zamakhshari/maknoon"
    description: "Versatile, ultra-efficient Post-Quantum CLI encryption tool."
    license: "MIT"
    # Specify the binaries to install
    binaries:
      - maknoon
    # Add manpage support
    manpages:
      - maknoon.1
