services:
  sender:
    build: ../..
    command: mcp --transport sse --address :8080
    ports:
      - "8080:8080"
    environment:
      - MAKNOON_PASSPHRASE=mcp-test-secret
    networks:
      mcp-net:
        ipv4_address: 172.25.0.10

  receiver:
    build: ../..
    command: mcp --transport sse --address :8081
    ports:
      - "8081:8081"
    environment:
      - MAKNOON_PASSPHRASE=mcp-test-secret
    networks:
      mcp-net:
        ipv4_address: 172.25.0.11

networks:
  mcp-net:
    ipam:
      config:
        - subnet: 172.25.0.0/16
