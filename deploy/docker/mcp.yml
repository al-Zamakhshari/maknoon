services:
  sender:
    build: ../..
    command: maknoon mcp --transport sse --address :8080 --tls-cert /certs/server.crt --tls-key /certs/server.key
    ports:
      - "8080:8080"
    environment:
      - MAKNOON_PASSPHRASE=mcp-test-secret
    networks:
      mcp-net:
        ipv4_address: 172.25.0.10
    volumes:
      - ./certs:/certs:ro

  receiver:
    build: ../..
    command: maknoon mcp --transport sse --address :8081 --tls-cert /certs/server.crt --tls-key /certs/server.key
    ports:
      - "8081:8081"
    environment:
      - MAKNOON_PASSPHRASE=mcp-test-secret
    networks:
      mcp-net:
        ipv4_address: 172.25.0.11
    volumes:
      - ./certs:/certs:ro

networks:
  mcp-net:
    ipam:
      config:
        - subnet: 172.25.0.0/16
