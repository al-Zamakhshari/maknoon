name: CI/CD
# Triggering new run to verify updated PR permissions

on:
  push:
    branches: [ "*" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pull_requests: write

jobs:
  quality:
    name: Quality & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Go Vet
        run: go vet ./...

      - name: Check Formatting (gofmt)
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run Staticcheck
        run: staticcheck ./...

  test:
    name: Test
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Run Tests
        run: go test -v ./...

  release:
    name: Release & Sync
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get Next Version
        id: next_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          DRY_RUN: true

      - name: Sync Extension Manifest
        run: |
          VERSION=$(echo "${{ steps.next_version.outputs.new_tag }}" | sed 's/v//')
          if [ -z "$VERSION" ]; then
             VERSION=$(git describe --tags --abbrev=0 | sed 's/v//')
          fi
          echo "Syncing manifest to version: $VERSION"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" extensions/maknoon-extension/gemini-extension.json
          cp integrations/maknoon-skill/SKILL.md extensions/maknoon-extension/skills/maknoon/SKILL.md
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/maknoon-extension/
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git commit -m "chore: sync extension manifest to $VERSION" || echo "No changes"
            git push origin HEAD:${{ github.head_ref }}
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
             # On main, we just update the file before GoReleaser or Tagging
             git commit -m "chore: sync extension manifest to $VERSION [skip ci]" || echo "No changes"
             git push origin main
          fi

      - name: Bump version and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Run GoReleaser
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
