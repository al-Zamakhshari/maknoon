name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Tidy
        run: go mod tidy
      - name: Go Vet
        run: go vet ./...
      - name: Check Formatting (gofmt)
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi
      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run Staticcheck
        run: staticcheck ./...

  test:
    name: Test
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Tidy
        run: go mod tidy
      - name: Run Tests
        run: go test -v ./...

  release:
    name: Release & Sync
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get Next Version
        id: next_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          DRY_RUN: true

      - name: Sync Extension Manifest
        if: github.event_name == 'pull_request'
        run: |
          VERSION=$(echo "${{ steps.next_version.outputs.new_tag }}" | sed 's/v//')
          if [ -z "$VERSION" ]; then
             VERSION=$(git describe --tags --abbrev=0 | sed 's/v//')
          fi
          echo "Syncing manifest to version: $VERSION"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" extensions/maknoon-extension/gemini-extension.json
          cp integrations/maknoon-skill/SKILL.md extensions/maknoon-extension/skills/maknoon/SKILL.md
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/maknoon-extension/
          git commit -m "chore: sync extension manifest to $VERSION [skip ci]" || echo "No changes"
          git push origin HEAD:refs/heads/${{ github.head_ref }}

      - name: Bump version and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Run GoReleaser
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
