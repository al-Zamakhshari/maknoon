name: CI/CD
# Triggering new run to verify updated PR permissions

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  quality:
    name: Quality & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Go Vet
        run: go vet ./...

      - name: Check Formatting (gofmt)
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Install Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run Staticcheck
        run: staticcheck ./...

  test:
    name: Test
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Run Tests
        run: go test -v ./...

  release:
    name: Release
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        id: tag_action
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Sync Extension Manifest
        id: sync_manifest
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/v//')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" extensions/maknoon-extension/gemini-extension.json
          cp integrations/maknoon-skill/SKILL.md extensions/maknoon-extension/skills/maknoon/SKILL.md
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create PR for Extension Sync
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync extension manifest to ${{ steps.sync_manifest.outputs.version }}"
          title: "chore: sync extension manifest to ${{ steps.sync_manifest.outputs.version }}"
          body: "Automated update of the Gemini CLI extension manifest to match the latest release version."
          branch: "sync-extension-${{ steps.sync_manifest.outputs.version }}"
          base: main
          delete-branch: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
