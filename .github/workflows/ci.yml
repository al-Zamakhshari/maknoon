name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pull_requests: write

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Tidy
        run: go mod tidy
      - name: Go Vet
        run: go vet ./...

  test:
    name: Test
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run Tests
        run: go test -v ./...

  release:
    name: Release & Sync
    needs: test
    runs-on: ubuntu-latest
    # Only run on main pushes, tags, or PRs to main
    if: |
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get Next Version
        id: next_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          DRY_RUN: true

      - name: Sync Extension Manifest
        run: |
          VERSION=$(echo "${{ steps.next_version.outputs.new_tag }}" | sed 's/v//')
          if [ -z "$VERSION" ]; then
             VERSION=$(git describe --tags --abbrev=0 | sed 's/v//')
          fi
          echo "Syncing manifest to version: $VERSION"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" extensions/maknoon-extension/gemini-extension.json
          cp integrations/maknoon-skill/SKILL.md extensions/maknoon-extension/skills/maknoon/SKILL.md
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions/maknoon-extension/
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git commit -m "chore: sync extension manifest to $VERSION [skip ci]" || echo "No changes"
            git push origin HEAD:${{ github.head_ref }}
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
             git commit -m "chore: sync extension manifest to $VERSION [skip ci]" || echo "No changes"
             git push origin main
          fi
